version: "2"

linters:
  default: standard
  exclusions:
    rules:
      # Tests (and fsmtest, a *testing.T-based conformance harness that isn't
      # itself named _test.go so it can be imported by other packages'
      # tests) routinely ignore setup/teardown errors (Close, SetState in a
      # fixture, ...) — that's noise, not a real bug; production code still
      # gets the full errcheck treatment.
      - path: (_test\.go|fsmtest/fsmtest\.go)
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
